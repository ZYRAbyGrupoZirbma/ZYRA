<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit y maximum-scale evitan el zoom forzado en móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZYRA Procurement</title>
  <style>
    :root{ --nav:#1e2a38; --accent:#16a085; }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;background:var(--nav);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}

    /* La app embebida ocupa toda la pantalla */
    #app{
      position:fixed;inset:0;width:100%;height:100%;border:0;
      opacity:0;transition:opacity .4s ease;
    }
    #app.loaded{opacity:1;}

    /* Pantalla de carga */
    #loader{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;
      background:var(--nav);color:#cfd8e3;z-index:2;
      transition:opacity .4s ease;
    }
    #loader.hide{opacity:0;pointer-events:none;}
    .logo{
      width:56px;height:56px;border-radius:14px;background:var(--accent);
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:700;
    }
    .brand{font-size:16px;font-weight:600;color:#fff;letter-spacing:.3px;}
    .spinner{
      width:30px;height:30px;border:3px solid rgba(255,255,255,.15);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

  <!-- Pantalla de carga (se oculta cuando la app termina de cargar) -->
  <div id="loader">
    <div class="logo">Z</div>
    <div class="brand">ZYRA Procurement</div>
    <div class="spinner"></div>
  </div>

  <!-- ===== Pega aquí tu URL /exec ===== -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbzgp2k1TtdJqKxoX_J6i94phgyx-g8-qLJlQ0g664bKtkqXKx1OhWPYr7P2QfcMuHw/exec?z=1"
    allow="clipboard-read; clipboard-write"
    onload="appLoaded()">
  </iframe>

  <script>
    var EXEC_BASE = "https://script.google.com/macros/s/AKfycbzgp2k1TtdJqKxoX_J6i94phgyx-g8-qLJlQ0g664bKtkqXKx1OhWPYr7P2QfcMuHw/exec";
    var app    = document.getElementById('app');
    var loader = document.getElementById('loader');

    function appLoaded(){
      app.classList.add('loaded');
      loader.classList.add('hide');
    }
    function showLoader(){
      app.classList.remove('loaded');
      loader.classList.remove('hide');
    }
    // Seguro: oculta el loader aunque onload tarde
    setTimeout(appLoaded, 8000);

    // El app embebido pide navegar -> cambiamos el iframe (se queda dentro del wrapper, sin banner)
    window.addEventListener('message', function(ev){
      var d = ev.data;
      if (!d || typeof d.zyraNav !== 'string') return;
      // Seguridad: solo aceptamos URLs de nuestro propio /exec
      if (d.zyraNav.indexOf(EXEC_BASE) !== 0) return;
      app.src = d.zyraNav;
    });
  </script>
</body>
</html>
